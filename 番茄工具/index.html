<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>番茄钟计时器</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="番茄钟计时器">
      <section class="timer-panel">
        <div class="timer-header">
          <p class="eyebrow">Focus Timer</p>
          <h1>番茄钟</h1>
        </div>

        <div class="timer-ring" aria-live="polite">
          <svg class="progress" viewBox="0 0 260 260" aria-hidden="true">
            <circle class="track" cx="130" cy="130" r="116"></circle>
            <circle class="bar" cx="130" cy="130" r="116"></circle>
          </svg>
          <div class="time-display">
            <span id="time">25:00</span>
            <small id="status">准备开始</small>
          </div>
        </div>

        <div class="controls" aria-label="计时控制">
          <button id="toggle" class="primary" type="button">开始</button>
          <button id="reset" class="secondary" type="button">重置</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
